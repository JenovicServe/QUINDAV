            const categorie = produitsData[categorieId];
            const container = document.getElementById('contenu-categorie');
            
            let produitsHtml = `
                <div class="categorie-header">
                    <h1>${categorie.nom}</h1>
                    <p>Choisissez le modèle qui vous intéresse</p>
                </div>
                <div class="produits-grid-detail">
            `;
            
            categorie.produits.forEach(produit => {
                produitsHtml += `
                    <div class="produit-modele">
                        <img src="${produit.image}" alt="${produit.nom}">
                        <h3>${produit.nom}</h3>
                        <p>${produit.description}</p>
                        <div class="produit-prix">${produit.prix}</div>
                        <div>
                            <input type="number" id="qty-${produit.id}" class="quantite-input" value="1" min="1">
                            <button class="btn-ajouter-liste" onclick="ajouterAListe('${produit.nom}', 'qty-${produit.id}')">📋 Ajouter à ma liste</button>
                        </div>
                    </div>
                `;
            });
            
            produitsHtml += `</div>`;
            container.innerHTML = produitsHtml;
        } else {
            document.getElementById('contenu-categorie').innerHTML = '<p style="text-align:center;">Catégorie non trouvée. <a href="produits.html">Retour aux produits</a></p>';
        }

        // Gestion de la liste
        let listeDevis = JSON.parse(localStorage.getItem('listeDevis')) || [];

        function ajouterAListe(nomProduit, inputId) {
            const quantiteInput = document.getElementById(inputId);
            const quantite = parseInt(quantiteInput.value) || 1;
            
            const existant = listeDevis.find(item => item.nom === nomProduit);
            if (existant) {
                existant.quantite += quantite;
            } else {
                listeDevis.push({ nom: nomProduit, quantite: quantite });
            }
            
            localStorage.setItem('listeDevis', JSON.stringify(listeDevis));
            mettreAJourCompteur();
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✓ Ajouté !';
            btn.style.background = '#2e8b57';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '#1a5f7a';
            }, 1500);
        }

        function mettreAJourCompteur() {
            const totalItems = listeDevis.reduce((sum, item) => sum + item.quantite, 0);
            const compteur = document.getElementById('liste-compteur');
            if (compteur) compteur.innerText = totalItems;
        }

        mettreAJourCompteur();
