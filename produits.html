<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nos produits - QUINDAV | Matériaux de construction Lubumbashi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .badge-liste {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: #1a5f7a;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
        }
        .badge-liste span {
            background: #2e8b57;
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 8px;
        }
        .product-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        /* Correction menu mobile */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block !important;
                cursor: pointer;
            }
            nav ul {
                display: none;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: white;
                flex-direction: column;
                padding: 20px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
                z-index: 999;
            }
            nav ul.active {
                display: flex !important;
            }
        }
    </style>
</head>
<body>
    <a href="https://wa.me/243974663487" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <a href="ma-liste.html" class="badge-liste">
        📋 Ma liste <span id="liste-compteur">0</span>
    </a>

    <header>
        <div class="container">
            <div class="logo">
                <h1>QUINDAV</h1>
                <p>Votre partenaire de confiance à Lubumbashi</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="produits.html" class="active">Produits</a></li>
                    <li><a href="reservation.html">Réservation</a></li>
                    <li><a href="a-propos.html">À propos</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>Nos produits</h1>
            <p>Cliquez sur une catégorie pour voir tous les modèles disponibles</p>
        </div>
    </section>

    <section class="categories">
        <div class="container">
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">Tous</button>
                <button class="filter-btn" data-category="vitres">Vitres & Carreaux</button>
                <button class="filter-btn" data-category="serrures">Serrures</button>
                <button class="filter-btn" data-category="silicone">Colles & Silicone</button>
                <button class="filter-btn" data-category="electrique">Équipements électriques</button>
            </div>

            <div class="products-catalog" id="productsCatalog">
                <!-- Les produits seront chargés dynamiquement -->
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>

    <script>
        // Liste des produits
        const produitsList = [
            { nom: "Vitres trempées", categorie: "vitres", image: "images/vitre_fenetre.jpg", desc: "Verre trempé haute résistance", tag: "Sur commande", lien: "produit-categorie.html?id=vitres-trempees" },
            { nom: "Carreaux de céramique", categorie: "vitres", image: "images/logo_carreau.jpg", desc: "Large choix de couleurs", tag: "En stock", lien: "produit-categorie.html?id=carreaux-ceramique" },
            { nom: "Vitre sur mesure", categorie: "vitres", image: "images/vitre_fenetre2.jpg", desc: "Découpe à vos dimensions", tag: "Sur commande", lien: "produit-categorie.html?id=vitre-sur-mesure" },
            { nom: "Serrures 3 points", categorie: "serrures", image: "images/serrure_3ponts.jpg", desc: "Sécurité renforcée", tag: "En stock", lien: "produit-categorie.html?id=serrures-3points" },
            { nom: "Poignées de porte", categorie: "serrures", image: "images/serrure.jpg", desc: "Design moderne", tag: "En stock", lien: "produit-categorie.html?id=poignees-porte" },
            { nom: "Cylindres sécurité", categorie: "serrures", image: "images/cylindre_haute_securité.jpg", desc: "Anti-crochetage", tag: "En stock", lien: "produit-categorie.html?id=cylindres-securite" },
            { nom: "Colle à carrelage", categorie: "silicone", image: "images/colleCarrelage.jpg", desc: "Adhérence renforcée", tag: "En stock", lien: "produit-categorie.html?id=colle-carrelage" },
            { nom: "Silicone sanitaire", categorie: "silicone", image: "images/silicone_sanitaires.jpg", desc: "Anti-moisissure", tag: "En stock", lien: "produit-categorie.html?id=silicone-sanitaire" },
            { nom: "Mastic polyuréthane", categorie: "silicone", image: "images/mastic_polyrethane.jpg", desc: "Étanchéité", tag: "En stock", lien: "produit-categorie.html?id=mastic-polyurethane" },
            { nom: "Câbles électriques", categorie: "electrique", image: "images/cable_electrique.jpg", desc: "Toutes sections", tag: "En stock", lien: "produit-categorie.html?id=cables-electriques" },
            { nom: "Disjoncteurs", categorie: "electrique", image: "images/disjoncteur_electrique.jpg", desc: "Protection électrique", tag: "En stock", lien: "produit-categorie.html?id=disjoncteurs" },
            { nom: "Luminaires LED", categorie: "electrique", image: "images/lampe_electrique.jpg", desc: "Économie d'énergie", tag: "En stock", lien: "produit-categorie.html?id=luminaires-led" },
            { nom: "Prises et interrupteurs", categorie: "electrique", image: "images/interrupteur.jpg", desc: "Grand choix", tag: "En stock", lien: "produit-categorie.html?id=prises-interrupteurs" }
        ];

        // Générer les produits
        const catalog = document.getElementById('productsCatalog');
        if (catalog) {
            produitsList.forEach(p => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product-item';
                productDiv.setAttribute('data-category', p.categorie);
                productDiv.innerHTML = `
                    <a href="${p.lien}">
                        <img src="${p.image}" alt="${p.nom}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 15px;">
                        <h3>${p.nom}</h3>
                        <p>${p.desc}</p>
                        <span class="product-tag">${p.tag}</span>
                    </a>
                `;
                catalog.appendChild(productDiv);
            });
        }

        // Filtrage
        const filterBtns = document.querySelectorAll('.filter-btn');
        const productItems = document.querySelectorAll('.product-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const category = btn.getAttribute('data-category');
                productItems.forEach(item => {
                    if (category === 'all' || item.getAttribute('data-category') === category) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });

        // Filtrage depuis URL
        const urlParams = new URLSearchParams(window.location.search);
        const categorie = urlParams.get('categorie');
        if (categorie) {
            setTimeout(() => {
                const bouton = document.querySelector(`.filter-btn[data-category="${categorie}"]`);
                if (bouton) bouton.click();
            }, 100);
        }

        // Compteur du badge
        function mettreAJourCompteur() {
            const liste = JSON.parse(localStorage.getItem('listeDevis')) || [];
            const total = liste.reduce((sum, item) => sum + item.quantite, 0);
            const compteur = document.getElementById('liste-compteur');
            if (compteur) compteur.innerText = total;
        }
        mettreAJourCompteur();
        setInterval(mettreAJourCompteur, 1000);

        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const navMenu = document.querySelector('nav ul');
            
            if (menuToggle && navMenu) {

                const newMenuToggle = menuToggle.cloneNode(true);
                menuToggle.parentNode.replaceChild(newMenuToggle, menuToggle);
                
                newMenuToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    navMenu.classList.toggle('active');
                });
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
